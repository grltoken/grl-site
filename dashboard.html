<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Consolas, monospace;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#topbar{
  width:100%;
  box-sizing:border-box;
  padding:15px 12px 0;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

#topbar button{
  background:none;
  border:1px solid #003366;
  color:#003366;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

#topbar button:hover{
  background:#003366;
  color:#fff;
}

#matriz{
  margin-top:25px;
}

svg{
  width:260px;
  max-width:90vw;
}

/* linhas */
line{
  stroke:gold;
  stroke-width:1.5;
  opacity:0.85;
}

/* círculos */
circle{
  fill:#003366;
  opacity:0.15;
  transition:0.3s;
}

circle.on{
  opacity:0.8;
}

circle.eu{
  fill:gold;
  opacity:1;
  filter: drop-shadow(0 0 4px rgba(255,215,0,0.6));
}

#info{
  width:90%;
  max-width:700px;
  margin-top:25px;
  text-align:center;
  color:#003366;
  font-size:13px;
  line-height:1.6;
  word-break:break-word;
}

#info p{
  margin:8px 0;
}

#convites{
  width:90%;
  max-width:700px;
  margin-top:10px;
  text-align:center;
}

#convites p{
  color:#003366;
  font-size:12px;
  margin:12px 0 6px;
}

#convites input{
  width:100%;
  box-sizing:border-box;
  border:1px solid #003366;
  padding:10px;
  font-family:Consolas, monospace;
  font-size:12px;
  color:#003366;
  background:#fff;
}

#curso{
  max-width:700px;
  width:90%;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:0.5s;
}

#curso.ativo{
  max-height:1000px;
  opacity:1;
  margin-top:25px;
  margin-bottom:30px;
}

#cursoConteudo{
  border:1px solid #003366;
  padding:16px;
  color:#003366;
  font-size:13px;
  line-height:1.6;
}

#seguranca{
  width:90%;
  max-width:700px;
  margin-top:18px;
  text-align:center;
  color:#666;
  font-size:11px;
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="toggleCurso()">Masterminds</button>
  <button onclick="logout()">Sair</button>
</div>

<div id="matriz">
  <svg viewBox="0 0 480 460">

    <line x1="240" y1="60" x2="120" y2="200"/>
    <line x1="240" y1="60" x2="360" y2="200"/>

    <line x1="120" y1="200" x2="60" y2="360"/>
    <line x1="120" y1="200" x2="180" y2="360"/>

    <line x1="360" y1="200" x2="300" y2="360"/>
    <line x1="360" y1="200" x2="420" y2="360"/>

    <circle id="Ma1" cx="60" cy="360" r="5"/>
    <circle id="Ma2" cx="180" cy="360" r="5"/>
    <circle id="Mb1" cx="300" cy="360" r="5"/>
    <circle id="Mb2" cx="420" cy="360" r="5"/>

    <circle id="Ma" cx="120" cy="200" r="6.5"/>
    <circle id="Mb" cx="360" cy="200" r="6.5"/>

    <circle id="M" cx="240" cy="60" r="8"/>
  </svg>
</div>


<div id="convites">
  <p>Convite A</p>
  <input id="conviteLeft" readonly>

  <p>Convite B</p>
  <input id="conviteRight" readonly>
</div>

<div id="seguranca">
  A sessão será encerrada automaticamente após 10 minutos de inatividade.
</div>

<div id="curso">
  <div id="cursoConteudo">
    Curso aqui
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function limparMatriz(){
  document.querySelectorAll("circle").forEach(c => {
    c.classList.remove("on", "eu");
  });
}

function marcar(id, classe){
  const el = document.getElementById(id);
  if(el) el.classList.add(classe);
}

function toggleCurso(){
  document.getElementById("curso").classList.toggle("ativo");
}

async function logout(){
  try{
    await signOut(auth);
    window.location.href = "index.html";
  }catch(error){
    alert("Erro ao sair.");
    console.error(error);
  }
}

window.toggleCurso = toggleCurso;
window.logout = logout;

let timeoutInatividade;

function resetTimer(){
  clearTimeout(timeoutInatividade);

  timeoutInatividade = setTimeout(async ()=>{
    try{
      await signOut(auth);
      alert("Sessão encerrada por segurança.");
      window.location.href = "index.html";
    }catch(error){
      console.error(error);
    }
  }, 10 * 60 * 1000);
}

["click","mousemove","keydown","touchstart","scroll"].forEach(evento => {
  document.addEventListener(evento, resetTimer, { passive:true });
});

resetTimer();

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "index.html";
    return;
  }

  try{
    limparMatriz();

    const userRef = doc(db, "usuarios", user.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
      alert("Usuário não encontrado.");
      await signOut(auth);
      window.location.href = "index.html";
      return;
    }

    const data = userSnap.data();
const temLeft = !!data.left;
const temRight = !!data.right;

// BASE
if (!temLeft || !temRight) {
  marcar("Ma1", "on");
  marcar("Ma1", "eu");

  if (temLeft) {
    marcar("Ma2", "on");
  }
}

// INTERMEDIÁRIO
if (temLeft && temRight) {
  marcar("Ma", "on");
  marcar("Ma", "eu");

  marcar("Ma1", "on");
  marcar("Ma2", "on");
}

    let leftEmail = "-";
    let rightEmail = "-";
    let leftLeft = false;
    let leftRight = false;
    let rightLeft = false;
    let rightRight = false;

    if(data.left){
      marcar("Ma", "on");

      const leftSnap = await getDoc(doc(db, "usuarios", data.left));
      if(leftSnap.exists()){
        const leftData = leftSnap.data();
        leftEmail = leftData.email || data.left;

        if(leftData.left){
          marcar("Ma1", "on");
          leftLeft = true;
        }

        if(leftData.right){
          marcar("Ma2", "on");
          leftRight = true;
        }
      }
    }

    if(data.right){
      marcar("Mb", "on");

      const rightSnap = await getDoc(doc(db, "usuarios", data.right));
      if(rightSnap.exists()){
        const rightData = rightSnap.data();
        rightEmail = rightData.email || data.right;

        if(rightData.left){
          marcar("Mb1", "on");
          rightLeft = true;
        }

        if(rightData.right){
          marcar("Mb2", "on");
          rightRight = true;
        }
      }
    }

    const baseUrl = window.location.origin + "/index.html";
    const conviteLeft = `${baseUrl}?ref=${user.uid}&side=left`;
    const conviteRight = `${baseUrl}?ref=${user.uid}&side=right`;

    document.getElementById("conviteLeft").value = conviteLeft;
    document.getElementById("conviteRight").value = conviteRight;

    const totalFechados =
      1 +
      (data.left ? 1 : 0) +
      (data.right ? 1 : 0) +
      (leftLeft ? 1 : 0) +
      (leftRight ? 1 : 0) +
      (rightLeft ? 1 : 0) +
      (rightRight ? 1 : 0);

    
  }catch(error){
    console.error(error);
    alert("Erro ao carregar dashboard.");
  }
});
</script>

</body>
</html>
