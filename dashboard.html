<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#topbar{
  width:100%;
  background:#003366;
  color:#fff;
  padding:10px;
  font-size:14px;
  text-align:center;
}

svg{
  width:95%;
  max-width:500px;
  margin-top:20px;
}

.node{
  fill:#003366;
  opacity:0.2;
  transition:0.4s;
}

.node.on{
  opacity:1;
}

.link{
  stroke:gold;
  stroke-width:2;
  opacity:0.2;
}

.link.on{
  opacity:1;
}

#btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#003366;
  color:#fff;
  border:none;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:28px;
}
</style>
</head>

<body>

<div id="topbar">Área do usuário</div>

<svg id="matrix" viewBox="0 0 500 500"></svg>

<button id="btn">+</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJDpMURpH3Za0VWvpRL4jLWjDhfBF4C5M",
  authDomain: "grlnetwork.firebaseapp.com",
  projectId: "grlnetwork",
  storageBucket: "grlnetwork.firebasestorage.app",
  messagingSenderId: "887517900417",
  appId: "1:887517900417:web:d6bfd784e762bbd6312780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let convites = [];
let userId = null;

// 🔐 GARANTE LOGIN
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  userId = user.uid;

  const ref = doc(db, "usuarios", userId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    convites = snap.data().convites || [];
    desenhar();
  }

});

// ===== ÁRVORE =====

function gerarArvore(nivel){

  const nodes = [];

  function criar(id, depth, index){
    nodes.push({id, depth, index});

    if(depth < nivel){
      criar(id+"a", depth+1, index*2);
      criar(id+"b", depth+1, index*2+1);
    }
  }

  criar("m", 0, 0);

  return nodes;
}

// ===== DESENHO =====

function desenhar(){

  const svg = document.getElementById("matrix");
  svg.innerHTML = "";

  const nodes = gerarArvore(3);

  const largura = 500;

  nodes.forEach(n => {

    if(n.id !== "m"){
      const pai = n.id.slice(0, -1);
      const parent = nodes.find(x => x.id === pai);

      if(parent){

        const x1 = (parent.index + 1) * (largura / (Math.pow(2, parent.depth+1)));
        const y1 = (parent.depth + 1) * 100;

        const x2 = (n.index + 1) * (largura / (Math.pow(2, n.depth+1)));
        const y2 = (n.depth + 1) * 100;

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("class", "link");

        svg.appendChild(line);
      }
    }

  });

  nodes.forEach((n, i) => {

    const x = (n.index + 1) * (largura / (Math.pow(2, n.depth+1)));
    const y = (n.depth + 1) * 100;

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");

    circle.setAttribute("cx", x);
    circle.setAttribute("cy", y);
    circle.setAttribute("r", 6);
    circle.setAttribute("class", "node");

    if(convites[i]){
      circle.classList.add("on");
    }

    svg.appendChild(circle);

  });

}

// ===== BOTÃO + =====

document.getElementById("btn").onclick = async function(){

  convites.push("novo");

  // 🔥 salva no Firebase
  const ref = doc(db, "usuarios", userId);

  await updateDoc(ref, {
    convites: convites
  });

  desenhar();

};

</script>



</body>
</html>
