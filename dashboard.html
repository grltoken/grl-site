<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#topbar{
  width:100%;
  background:#003366;
  color:#fff;
  padding:10px;
  font-size:14px;
  text-align:center;
}

svg{
  width:95%;
  max-width:500px;
  margin-top:20px;
}

.node{
  fill:#003366;
  opacity:0.2;
  transition:0.4s;
}

.node.on{
  opacity:1;
}

.link{
  stroke:gold;
  stroke-width:2;
  opacity:0.2;
}

.link.on{
  opacity:1;
}

#btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#003366;
  color:#fff;
  border:none;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:28px;
}
</style>
</head>

<body>

<div id="topbar">Área do usuário</div>

<svg id="matrix" viewBox="0 0 500 500"></svg>

<button id="btn">+</button>

<script>

// ===== ESTRUTURA DINÂMICA =====

let convites = ["a","b","c","d","e","f"]; // simulação

function gerarArvore(nivel){

  const nodes = [];

  function criar(id, depth, index){
    nodes.push({id, depth, index});

    if(depth < nivel){
      criar(id+"a", depth+1, index*2);
      criar(id+"b", depth+1, index*2+1);
    }
  }

  criar("m", 0, 0);

  return nodes;
}

// ===== DESENHAR =====

function desenhar(){

  const svg = document.getElementById("matrix");
  svg.innerHTML = "";

  const nodes = gerarArvore(3); // nível da árvore

  const largura = 500;
  const altura = 500;

  const niveis = {};

  nodes.forEach(n => {
    if(!niveis[n.depth]) niveis[n.depth] = [];
    niveis[n.depth].push(n);
  });

  // desenhar linhas primeiro
  nodes.forEach(n => {

    if(n.id !== "m"){
      const pai = n.id.slice(0, -1);

      const parent = nodes.find(x => x.id === pai);

      if(parent){

        const x1 = (parent.index + 1) * (largura / (Math.pow(2, parent.depth+1)));
        const y1 = (parent.depth + 1) * 100;

        const x2 = (n.index + 1) * (largura / (Math.pow(2, n.depth+1)));
        const y2 = (n.depth + 1) * 100;

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");

        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("class", "link");

        svg.appendChild(line);
      }
    }

  });

  // desenhar nós
  nodes.forEach((n, i) => {

    const x = (n.index + 1) * (largura / (Math.pow(2, n.depth+1)));
    const y = (n.depth + 1) * 100;

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");

    circle.setAttribute("cx", x);
    circle.setAttribute("cy", y);
    circle.setAttribute("r", 6);
    circle.setAttribute("class", "node");

    // 🔥 ativa baseado nos convites
    if(convites[i]){
      circle.classList.add("on");
    }

    svg.appendChild(circle);

  });

}

desenhar();

// ===== BOTÃO + (expande) =====

document.getElementById("btn").onclick = function(){
  convites.push("novo");
  desenhar();
};

</script>

</body>
</html>
