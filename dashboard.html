<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#ffffff;
  text-align:center;
}

/* TOPO */
#topbar{
  background:#003366;
  color:#fff;
  padding:15px;
  font-size:20px;
}

/* MATRIZ */
svg{
  width:90%;
  max-width:400px;
  margin-top:30px;
}

circle{
  fill:#003366;
  opacity:0.2;
}

.on{
  opacity:1;
}

/* BOTÃO GRANDE */
#btn{
  margin-top:30px;
  padding:18px;
  width:80%;
  max-width:300px;
  font-size:18px;
  background:#003366;
  color:#fff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="topbar">Área do usuário</div>

<svg viewBox="0 0 480 460">

<circle id="b1" cx="60" cy="360" r="8"/>
<circle id="b2" cx="180" cy="360" r="8"/>
<circle id="b3" cx="300" cy="360" r="8"/>
<circle id="b4" cx="420" cy="360" r="8"/>

<circle id="m1" cx="120" cy="200" r="10"/>
<circle id="m2" cx="360" cy="200" r="10"/>

<circle id="top" cx="240" cy="60" r="12"/>

</svg>

<button id="btn">Nova entrada</button>

<script>

let step = 0;

const nodes = {
  b1:document.getElementById("b1"),
  b2:document.getElementById("b2"),
  b3:document.getElementById("b3"),
  b4:document.getElementById("b4"),
  m1:document.getElementById("m1"),
  m2:document.getElementById("m2"),
  top:document.getElementById("top")
};

function clearAll(){
  Object.values(nodes).forEach(n => n.classList.remove("on"));
}

document.getElementById("btn").onclick = function(){

  step++;

  if(step === 1){
    nodes.b1.classList.add("on");
  }

  else if(step === 2){
    nodes.b2.classList.add("on");
  }

  else if(step === 3){
    nodes.m1.classList.add("on");
  }

  else if(step === 4){
    nodes.b3.classList.add("on");
  }

  else if(step === 5){
    nodes.b4.classList.add("on");
  }

  else if(step === 6){
    nodes.m2.classList.add("on");
  }

  else if(step === 7){
    nodes.top.classList.add("on");
  }

  else{
    clearAll();
    step = 0;
  }

};

</script>

</body>
</html>
