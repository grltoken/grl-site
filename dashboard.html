<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Minha Matriz</h2>

<div id="matriz"></div>

<h3>Convites</h3>
<div id="convites"></div>

<button onclick="logout()">Sair</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>

<script>

// 🔒 PROTEÇÃO TOTAL
auth.onAuthStateChanged(async (user) => {

  if(!user){
    alert("Acesso restrito");
    window.location.href = "index.html";
    return;
  }

  try {

    const doc = await db.collection("usuarios").doc(user.uid).get();

    // 🔒 SE NÃO EXISTE NO BANCO → BLOQUEIA
    if(!doc.exists){
      alert("Usuário inválido");
      await auth.signOut();
      window.location.href = "index.html";
      return;
    }

    const data = doc.data();

    // 🔒 SE NÃO TEM MATRIZ → BLOQUEIA
    if(!data.matriz){
      alert("Acesso não autorizado");
      await auth.signOut();
      window.location.href = "index.html";
      return;
    }

    render(data);

  } catch(e){
    alert("Erro ao carregar dados");
    window.location.href = "index.html";
  }

});

// 🎯 RENDER MATRIZ
function render(data){

  let html = "";

  const nomes = {
    m1: "Direto 1",
    m2: "Direto 2",
    m1a: "Nível 2 - A",
    m1b: "Nível 2 - B",
    m2a: "Nível 2 - C",
    m2b: "Nível 2 - D"
  };

  for(let key in data.matriz){
    html += `<div>${nomes[key]}: ${data.matriz[key] ? "✔" : "❌"}</div>`;
  }

  document.getElementById("matriz").innerHTML = html;

  let conv = "";

  data.convites.forEach(c => {
    conv += `<div onclick="copiar('${c}')" style="cursor:pointer;">${c}</div>`;
  });

  document.getElementById("convites").innerHTML = conv;

}

// 📋 COPIAR CONVITE
function copiar(texto){
  navigator.clipboard.writeText(texto);
  alert("Convite copiado: " + texto);
}

// 🚪 LOGOUT
function logout(){
  auth.signOut();
  window.location.href = "index.html";
}

</script>

</body>
</html>
