<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Consolas, monospace;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#topbar{ margin-top:15px; }

#topbar button{
  background:none;
  border:1px solid #003366;
  color:#003366;
  padding:5px 12px;
  cursor:pointer;
}

svg{ width:260px; }

line{ stroke:gold; stroke-width:1.5; }

circle{
  fill:#003366;
  opacity:0.15;
}

circle.on{ opacity:0.8; }
circle.eu{ fill:gold; opacity:1; }

#info{
  margin-top:20px;
  text-align:center;
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="toggleCurso()">Masterminds</button>
</div>

<div id="matriz">

<svg viewBox="0 0 480 460">

<line x1="240" y1="60" x2="120" y2="200"/>
<line x1="240" y1="60" x2="360" y2="200"/>

<line x1="120" y1="200" x2="60" y2="360"/>
<line x1="120" y1="200" x2="180" y2="360"/>

<line x1="360" y1="200" x2="300" y2="360"/>
<line x1="360" y1="200" x2="420" y2="360"/>

<circle id="Ma1" cx="60" cy="360" r="5"/>
<circle id="Ma2" cx="180" cy="360" r="5"/>
<circle id="Mb1" cx="300" cy="360" r="5"/>
<circle id="Mb2" cx="420" cy="360" r="5"/>

<circle id="Ma" cx="120" cy="200" r="6.5"/>
<circle id="Mb" cx="360" cy="200" r="6.5"/>

<circle id="M" cx="240" cy="60" r="8"/>

</svg>

</div>

<div id="info"></div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function marcar(id, classe){
  const el = document.getElementById(id);
  if(el) el.classList.add(classe);
}

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const snap = await getDoc(doc(db, "usuarios", user.uid));
  const data = snap.data();

  marcar("M","on");
  marcar("M","eu");

  if(data.left){
    marcar("Ma","on");

    const leftDoc = await getDoc(doc(db,"usuarios",data.left));
    const leftData = leftDoc.data();

    if(leftData.left) marcar("Ma1","on");
    if(leftData.right) marcar("Ma2","on");
  }

  if(data.right){
    marcar("Mb","on");

    const rightDoc = await getDoc(doc(db,"usuarios",data.right));
    const rightData = rightDoc.data();

    if(rightData.left) marcar("Mb1","on");
    if(rightData.right) marcar("Mb2","on");
  }

  document.getElementById("info").innerHTML = `
    <p><b>${data.email}</b></p>
    <p>Convite A: ${window.location.origin}/index.html?ref=${user.uid}&side=left</p>
    <p>Convite B: ${window.location.origin}/index.html?ref=${user.uid}&side=right</p>
  `;

});

</script>

</body>
</html>
