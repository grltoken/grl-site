<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Consolas, monospace;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

svg{
  width:260px;
  max-width:90vw;
  margin-top:40px;
}

line{
  stroke:gold;
  stroke-width:1.5;
}

circle{
  fill:#003366;
  opacity:0.15;
  transition:0.3s;
}

circle.on{
  opacity:0.8;
}

circle.eu{
  fill:gold;
  opacity:1;
}
</style>
</head>

<body>

<svg viewBox="0 0 480 460">

  <line x1="240" y1="60" x2="120" y2="200"/>
  <line x1="240" y1="60" x2="360" y2="200"/>

  <line x1="120" y1="200" x2="60" y2="360"/>
  <line x1="120" y1="200" x2="180" y2="360"/>

  <line x1="360" y1="200" x2="300" y2="360"/>
  <line x1="360" y1="200" x2="420" y2="360"/>

  <!-- BASE -->
  <circle id="Maa" cx="60" cy="360" r="5"/>
  <circle id="Mab" cx="180" cy="360" r="5"/>
  <circle id="Mba" cx="300" cy="360" r="5"/>
  <circle id="Mbb" cx="420" cy="360" r="5"/>

  <!-- INTERMEDIÁRIO -->
  <circle id="Ma" cx="120" cy="200" r="6.5"/>
  <circle id="Mb" cx="360" cy="200" r="6.5"/>

  <!-- TOPO -->
  <circle id="M" cx="240" cy="60" r="8"/>

</svg>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function limpar(){
  document.querySelectorAll("circle").forEach(c=>{
    c.classList.remove("on","eu");
  });
}

function marcar(slot, uid, meuId){
  const el = document.getElementById(slot);
  if(!el) return;

  el.classList.add("on");

  if(uid === meuId){
    el.classList.add("eu");
  }
}

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href = "index.html";
    return;
  }

  try{

    limpar();

    const userSnap = await getDoc(doc(db,"usuarios",user.uid));
    if(!userSnap.exists()) throw "user";

    const data = userSnap.data();

    const matrizRef = doc(db,"MATRIZES", data.matrizId || "principal");
    const matrizSnap = await getDoc(matrizRef);

    if(!matrizSnap.exists()) throw "matriz";

    const slots = matrizSnap.data().slots || {};

    Object.entries(slots).forEach(([slot, uid])=>{
      if(uid){
        marcar(slot, uid, user.uid);
      }
    });

  }catch(e){
    console.error("ERRO DASHBOARD:", e);
    alert("Erro ao carregar dashboard.");
  }
});
</script>

</body>
</html>
