<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
  margin:0;
  font-family: Consolas, monospace;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#topbar{
  width:100%;
  box-sizing:border-box;
  padding:15px 12px 0;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

#topbar button{
  background:none;
  border:1px solid #003366;
  color:#003366;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

#topbar button:hover{
  background:#003366;
  color:#fff;
}

#matriz{
  margin-top:25px;
}

svg{
  width:260px;
  max-width:90vw;
}

/* linhas */
line{
  stroke:gold;
  stroke-width:1.5;
  opacity:0.85;
}

/* círculos */
circle{
  fill:#003366;
  opacity:0.15;
  transition:0.3s;
}

circle.on{
  opacity:0.8;
}

circle.eu{
  fill:gold;
  opacity:1;
  filter: drop-shadow(0 0 4px rgba(255,215,0,0.6));
}

#info{
  width:90%;
  max-width:700px;
  margin-top:25px;
  text-align:center;
  color:#003366;
  font-size:13px;
  line-height:1.6;
  word-break:break-word;
}

#info p{
  margin:8px 0;
}

#convites{
  width:90%;
  max-width:700px;
  margin-top:10px;
  text-align:center;
}

#convites p{
  color:#003366;
  font-size:12px;
  margin:12px 0 6px;
}

#convites input{
  width:100%;
  box-sizing:border-box;
  border:1px solid #003366;
  padding:10px;
  font-family:Consolas, monospace;
  font-size:12px;
  color:#003366;
  background:#fff;
}

#curso{
  max-width:700px;
  width:90%;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:0.5s;
}

#curso.ativo{
  max-height:1000px;
  opacity:1;
  margin-top:25px;
  margin-bottom:30px;
}

#cursoConteudo{
  border:1px solid #003366;
  padding:16px;
  color:#003366;
  font-size:13px;
  line-height:1.6;
}

#seguranca{
  width:90%;
  max-width:700px;
  margin-top:18px;
  text-align:center;
  color:#666;
  font-size:11px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="toggleCurso()">Masterminds</button>
  <button onclick="logout()">Sair</button>
</div>

<div id="matriz">
  <svg viewBox="0 0 480 460">

    <line x1="240" y1="60" x2="120" y2="200"/>
    <line x1="240" y1="60" x2="360" y2="200"/>

    <line x1="120" y1="200" x2="60" y2="360"/>
    <line x1="120" y1="200" x2="180" y2="360"/>

    <line x1="360" y1="200" x2="300" y2="360"/>
    <line x1="360" y1="200" x2="420" y2="360"/>

    <circle id="maa" cx="60" cy="360" r="5"/>
    <circle id="mab" cx="180" cy="360" r="5"/>
    <circle id="mba" cx="300" cy="360" r="5"/>
    <circle id="mbb" cx="420" cy="360" r="5"/>

    <circle id="ma" cx="120" cy="200" r="6.5"/>
    <circle id="mb" cx="360" cy="200" r="6.5"/>

    <circle id="m" cx="240" cy="60" r="8"/>
  </svg>
</div>

<div id="info"></div>

<div id="convites">
  <p>Convite A</p>
  <input id="conviteLeft" readonly>

  <p>Convite B</p>
  <input id="conviteRight" readonly>
</div>

<div id="seguranca">
  A sessão será encerrada automaticamente após 10 minutos de inatividade.
</div>

<div id="curso">
  <div id="cursoConteudo">
    Curso aqui
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function limparMatriz(){
  document.querySelectorAll("circle").forEach(c => {
    c.classList.remove("on", "eu");
  });
}

function marcar(slot, uid, meuUid){
  const el = document.getElementById(slot);
  if(!el) return;

  el.classList.add("on");

  if(uid === meuUid){
    el.classList.add("eu");
  }
}

function toggleCurso(){
  document.getElementById("curso").classList.toggle("ativo");
}

async function logout(){
  try{
    await signOut(auth);
    window.location.href = "index.html";
  }catch(error){
    alert("Erro ao sair.");
    console.error(error);
  }
}

window.toggleCurso = toggleCurso;
window.logout = logout;

let timeoutInatividade;

function resetTimer(){
  clearTimeout(timeoutInatividade);

  timeoutInatividade = setTimeout(async ()=>{
    try{
      await signOut(auth);
      alert("Sessão encerrada por segurança.");
      window.location.href = "index.html";
    }catch(error){
      console.error(error);
    }
  }, 10 * 60 * 1000);
}

["click","mousemove","keydown","touchstart","scroll"].forEach(evento => {
  document.addEventListener(evento, resetTimer, { passive:true });
});

resetTimer();

async function pegarNomeOuEmail(uid){
  if(!uid) return "-";

  try{
    const snap = await getDoc(doc(db, "usuarios", uid));
    if(!snap.exists()) return uid;

    const data = snap.data();
    return data.nome || data.email || uid;
  }catch{
    return uid;
  }
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "index.html";
    return;
  }

  try{
    limparMatriz();

    const userRef = doc(db, "usuarios", user.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
      alert("Usuário não encontrado.");
      await signOut(auth);
      window.location.href = "index.html";
      return;
    }

    const data = userSnap.data();

    const matrizId = data.matrizId || "principal";
    const matrizRef = doc(db, "MATRIZES", matrizId);
    const matrizSnap = await getDoc(matrizRef);

    if(!matrizSnap.exists()){
      alert("Matriz não encontrada.");
      return;
    }

    const matrizData = matrizSnap.data();
    const slots = matrizData.slots || {};

    Object.entries(slots).forEach(([slot, uid])=>{
      if(uid){
        marcar(slot, uid, user.uid);
      }
    });

    const leftUid = slots.ma || null;
    const rightUid = slots.mb || null;

    const leftNome = await pegarNomeOuEmail(leftUid);
    const rightNome = await pegarNomeOuEmail(rightUid);

    const totalFechados = Object.values(slots).filter(Boolean).length;

    const baseUrl = window.location.origin + "/index.html";
    const conviteLeft = `${baseUrl}?ref=${user.uid}&side=left`;
    const conviteRight = `${baseUrl}?ref=${user.uid}&side=right`;

    document.getElementById("conviteLeft").value = conviteLeft;
    document.getElementById("conviteRight").value = conviteRight;

    document.getElementById("info").innerHTML = `
      <p><b>${data.nome || "Usuário"}</b></p>
      <p>${data.email || ""}</p>
      <p>Status: ${data.status || "open"}</p>
      <p>Pai: ${data.parent || "sem pai"}</p>
      <p>Direto A: ${leftNome}</p>
      <p>Direto B: ${rightNome}</p>
      <p>Matriz: ${matrizId}</p>
      <p>Posições ocupadas nesta matriz: ${totalFechados}/7</p>
    `;

  }catch(error){
    console.error("ERRO DASHBOARD:", error);
    alert("Erro ao carregar dashboard.");
  }
});
</script>

</body>
</html>
