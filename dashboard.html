<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{  
  margin:0;
  font-family: Consolas, monospace;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#topbar{
  width:100%;
  text-align:center;
  padding:10px;
  font-size:14px;
  border-bottom:1px solid #003366;
}

svg{
  width:90%;
  max-width:420px;
  margin-top:30px;
}

circle{
  fill:#003366;
  opacity:0.2;
  transition:0.4s;
}

circle.on{
  opacity:1;
}

#top{
  fill:gold;
}

.link{
  stroke:gold;
  stroke-width:2;
  opacity:0.2;
}

.link.on{
  opacity:1;
}

#convites{
  margin-top:20px;
  text-align:center;
}

.convite{
  border:1px solid #003366;
  padding:8px;
  margin:5px;
}

#btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#003366;
  color:#fff;
  border:none;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:28px;
}

/* CURSO */
#curso{
  margin-top:40px;
  max-width:500px;
  text-align:center;
}

.menu button{
  margin:5px;
  padding:6px;
  background:#003366;
  color:#fff;
  border:none;
  cursor:pointer;
}

.aula{
  border:1px solid #003366;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="topbar">Área do usuário</div>

<svg viewBox="0 0 480 460">

<line x1="240" y1="60" x2="120" y2="200" class="link"/>
<line x1="240" y1="60" x2="360" y2="200" class="link"/>

<circle id="m1a" cx="120" cy="200" r="7"/>
<circle id="m1b" cx="360" cy="200" r="7"/>
<circle id="top" cx="240" cy="60" r="9"/>

</svg>

<div id="convites"></div>

<button id="btn">+</button>

<!-- CURSO -->
<div id="curso">

  <h2>Masterminds</h2>

  <div class="menu">
    <button onclick="abrirAula(1)">Aula 1</button>
    <button onclick="abrirAula(2)">Aula 2</button>
    <button onclick="abrirAula(3)">Aula 3</button>
    <button onclick="abrirAula(4)">Aula 4</button>
    <button onclick="abrirAula(5)">Aula 5</button>
    <button onclick="abrirAula(6)">Aula 6</button>
    <button onclick="abrirAula(7)">Aula 7</button>
    <button onclick="abrirAula(8)">Aula 8</button>
    <button onclick="abrirAula(9)">Aula 9</button>
    <button onclick="abrirAula(10)">Aula 10</button>
  </div>

  <div id="conteudoAula" class="aula"></div>

</div>

<script>
function abrirAula(n){

  const aulas = {
    1: "Você não está aqui apenas para participar. Você está aqui para se posicionar dentro de um network.",
    2: "Você não é o produto. Você representa um conceito. Quando o conceito é claro, ele se sustenta.",
    3: "Você inicia formando sua equipe com duas pessoas. Essa estrutura é o seu ambiente de desenvolvimento.",
    4: "O crescimento acontece através das pessoas. Você constrói com clareza, direção e acompanhamento.",
    5: "Você assume o papel de líder. Sua equipe reflete sua condução.",
    6: "O crescimento vem do network das pessoas. Cada um utiliza sua própria rede.",
    7: "Organize encontros, alinhe estratégias e mantenha o grupo ativo.",
    8: "Até completar sua estrutura, a responsabilidade é sua.",
    9: "Ao completar sua estrutura, você se torna Mastermind.",
    10: "Sua equipe se torna independente e o processo se replica."
  };

  document.getElementById("conteudoAula").innerHTML = `
    <p>${aulas[n]}</p>
    <h3 style="margin-top:20px;">Masterminds.</h3>
  `;
}
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJDpMURpH3Za0VWvpRL4jLWjDhfBF4C5M",
  authDomain: "grlnetwork.firebaseapp.com",
  projectId: "grlnetwork",
  storageBucket: "grlnetwork.firebasestorage.app",
  messagingSenderId: "887517900417",
  appId: "1:887517900417:web:d6bfd784e762bbd6312780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;
let data = null;

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  userId = user.uid;

  const ref = doc(db, "usuarios", userId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    data = snap.data();
    atualizarTela();
  }

});

function atualizarTela(){
  mostrarMatriz();
  mostrarConvites();
}

function mostrarMatriz(){

  document.querySelectorAll("circle").forEach(c => c.classList.remove("on"));

  if(data.left) document.getElementById("m1a").classList.add("on");
  if(data.right) document.getElementById("m1b").classList.add("on");

  if(data.left && data.right){
    document.getElementById("top").classList.add("on");
  }

}

function mostrarConvites(){

  const div = document.getElementById("convites");

  div.innerHTML = "<h3>Sua Matriz</h3>";

  const a = document.createElement("div");
  a.className = "convite";
  a.innerText = data.left ? "A ocupado" : "Vaga A";

  const b = document.createElement("div");
  b.className = "convite";
  b.innerText = data.right ? "B ocupado" : "Vaga B";

  div.appendChild(a);
  div.appendChild(b);

}

document.getElementById("btn").onclick = async function(){

  const ref = doc(db, "usuarios", userId);

  if (!data.left) {
    await updateDoc(ref, { left: "ocupado" });
    data.left = "ocupado";

  } else if (!data.right) {
    await updateDoc(ref, { right: "ocupado" });
    data.right = "ocupado";

  } else {
    alert("Você já completou sua matriz");
    return;
  }

  atualizarTela();

};

</script>

</body>
</html>
