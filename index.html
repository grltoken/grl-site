<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz</title>
<style>
body{
  background:#ffffff;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
  font-family: Consolas, monospace;
}

#loginBtn{
  position:fixed;
  top:10px;
  left:10px;
}

#loginBtn button{
  padding:7px 12px;
  background:#003366;
  color:#fff;
  border:none;
  border-radius:10px;
  font-family: Consolas, monospace;
  cursor:pointer;
  box-shadow:0 6px 16px rgba(0,51,102,0.18);
  transition:opacity .2s ease, transform .06s ease;
}

#loginBtn button:hover{
  opacity:.92;
}

#loginBtn button:active{
  transform:translateY(1px);
}

h1{
  color:#003366;
  font-family: Consolas, monospace;
  font-size:28px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:40px;
}

svg{
  width:90%;
  max-width:420px;
}

circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transform-origin:center;
  transform-box:fill-box;
  transition: opacity .2s ease, transform .2s ease;
}

circle.on{
  opacity:1;
  transform:scale(1);
}

#loginModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(8,18,40,0.32);
  backdrop-filter: blur(2px);
  align-items:center;
  justify-content:center;
  padding:20px;
  box-sizing:border-box;
}

.modal-box{
  width:100%;
  max-width:340px;
  background:#ffffff;
  border:1px solid rgba(0,51,102,0.18);
  border-radius:16px;
  padding:18px;
  box-sizing:border-box;
  box-shadow:0 14px 40px rgba(0,35,70,0.14);
}

.modal-box h2{
  margin:0 0 12px;
  color:#002f5e;
  font-size:15px;
  font-weight:600;
  letter-spacing:.2px;
}

.modal-box input{
  width:100%;
  border:1px solid rgba(0,51,102,0.25);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:10px;
  font-family: Consolas, monospace;
  font-size:13px;
  color:#003366;
  box-sizing:border-box;
  outline:none;
  transition:border-color .2s, box-shadow .2s;
}

.modal-box input:focus{
  border-color:#2a6fb3;
  box-shadow:0 0 0 3px rgba(42,111,179,.12);
}

.modal-row{
  display:flex;
  gap:8px;
  margin-top:4px;
}

.modal-row button{
  flex:1;
  padding:9px 10px;
  border-radius:10px;
  border:1px solid #003366;
  background:#003366;
  color:#fff;
  font-family: Consolas, monospace;
  font-size:12px;
  cursor:pointer;
  transition:transform .06s ease, opacity .2s ease;
}

.modal-row button:last-child{
  background:#fff;
  color:#003366;
}

.modal-row button:hover{
  opacity:.9;
}

.modal-row button:active{
  transform:translateY(1px);
}
</style>
</head>
<body>
<div id="loginBtn">
  <button id="loginButton" onclick="abrirLogin()">Login</button>
</div>

<h1 id="title"></h1>

<svg viewBox="0 0 480 460">
  <circle id="maa" cx="60" cy="360" r="6"/>
  <circle id="mab" cx="180" cy="360" r="6"/>
  <circle id="mba" cx="300" cy="360" r="6"/>
  <circle id="mbb" cx="420" cy="360" r="6"/>
  <circle id="ma" cx="120" cy="200" r="7"/>
  <circle id="mb" cx="360" cy="200" r="7"/>
  <circle id="m" cx="240" cy="60" r="8"/>
</svg>

  <div id="loginModal">
    <div class="modal-box">
      <h2>Entrar na Matriz</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="senha" type="password" placeholder="Senha">
      <div class="modal-row">
        <button onclick="login()">Entrar</button>
        <button onclick="fecharLogin()">Fechar</button>
      </div>
    </div>
  </div>

<script>
const nodes = {
  b1: document.getElementById("maa"),
  b2: document.getElementById("mab"),
  b3: document.getElementById("mba"),
  b4: document.getElementById("mbb"),
  m1: document.getElementById("ma"),
  m2: document.getElementById("mb"),
  top: document.getElementById("m")
};

const title = document.getElementById("title");
const text = "MASTERMINDs";

function show(id){ nodes[id].classList.add("on"); }
function hide(id){ nodes[id].classList.remove("on"); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function typeText(){
  title.innerHTML = "";
  let i = 0;
  const interval = setInterval(()=>{
    title.innerHTML = text.substring(0, i + 1) + "|";
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 80);
}

function run(){
  reset();
  title.innerHTML = "";
  setTimeout(()=>{show("b1");}, 400);
  setTimeout(()=>{hide("b1");}, 1100);
  setTimeout(()=>{show("m1");}, 1300);
  setTimeout(()=>{show("b1"); show("b2");}, 2000);
  setTimeout(()=>{hide("m1"); hide("b1"); hide("b2");}, 2600);
  setTimeout(()=>{show("top");}, 2800);
  setTimeout(()=>{show("m1"); show("m2");}, 3600);
  setTimeout(()=>{show("b1"); show("b2"); show("b3"); show("b4");}, 4500);
  setTimeout(()=>{reset();}, 5800);
  setTimeout(()=>{typeText();}, 6500);
}

run();
setInterval(run, 9000);
</script>

<script>
function abrirLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function fecharLogin() {
  document.getElementById("loginModal").style.display = "none";
}

// Fallback para evitar botão "morto" se o módulo falhar.
window.login = function () {
  alert("Carregando login... se persistir, recarregue a página.");
};

window.abrirLogin = abrirLogin;
window.fecharLogin = fecharLogin;

window.addEventListener("click", function(event) {
  const modal = document.getElementById("loginModal");
  if (event.target === modal) {
    fecharLogin();
  }
});
</script>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  createUserWithEmailAndPassword,
  deleteUser,
  onAuthStateChanged,
  signOut,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  collection,
  doc,
  getCountFromServer,
  getDoc,
  runTransaction,
  serverTimestamp,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Regra de entrada: convite ocupa somente a base.
const SLOT_ORDER = ["maa", "mab", "mba", "mbb"];
const BASE_SLOTS = ["maa", "mab", "mba", "mbb"];
const params = new URL(window.location.href).searchParams;
const ref = (params.get("ref") || "").trim();
const bootstrapRef = doc(db, "sistema", "bootstrap");
let bloqueiaRedirectAuth = false;

function idDocumentoValido(id) {
  return (
    typeof id === "string" &&
    id.trim().length > 0 &&
    !id.includes("/")
  );
}

function extrairUid(valor) {
  if (idDocumentoValido(valor)) return valor.trim();
  if (valor && typeof valor === "object") {
    if (idDocumentoValido(valor.uid)) return valor.uid.trim();
    if (idDocumentoValido(valor.userUid)) return valor.userUid.trim();
  }
  return null;
}

function proximoSlotDisponivel(slots) {
  for (const slot of SLOT_ORDER) {
    if (!slots[slot]) return slot;
  }
  return null;
}

function normalizarSlots(slots) {
  const origem = slots || {};
  return {
    m: origem.m ?? null,
    ma: origem.ma ?? null,
    mb: origem.mb ?? null,
    maa: origem.maa ?? null,
    mab: origem.mab ?? null,
    mba: origem.mba ?? null,
    mbb: origem.mbb ?? null
  };
}

function contarBasePreenchida(slots) {
  return BASE_SLOTS.filter((slot) => Boolean(slots?.[slot])).length;
}

function posicionarConvidadoNaBase(slots, novoUid) {
  const atualizados = normalizarSlots(slots);

  // Fila lateral da base: novo entra em maa e empurra os demais para direita.
  if (atualizados.mbb) {
    return { slots: atualizados, slot: null };
  }

  atualizados.mbb = atualizados.mba || null;
  atualizados.mba = atualizados.mab || null;
  atualizados.mab = atualizados.maa || null;
  atualizados.maa = novoUid;
  return { slots: atualizados, slot: "maa" };
}

function promoverDonoQualificado(slots, ownerUid) {
  const atualizados = normalizarSlots(slots);
  const basePreenchida = contarBasePreenchida(atualizados);
  if (basePreenchida < 2) {
    return { slots: atualizados, slotPromovido: null };
  }

  const slotBaseDono = BASE_SLOTS.find((slot) => atualizados[slot] === ownerUid);
  if (!slotBaseDono) {
    return { slots: atualizados, slotPromovido: null };
  }

  if (!atualizados.ma) {
    atualizados.ma = ownerUid;
    atualizados[slotBaseDono] = null;
    return { slots: atualizados, slotPromovido: "ma" };
  }

  if (atualizados.ma === ownerUid) {
    return { slots: atualizados, slotPromovido: "ma" };
  }

  if (!atualizados.mb) {
    atualizados.mb = ownerUid;
    atualizados[slotBaseDono] = null;
    return { slots: atualizados, slotPromovido: "mb" };
  }

  if (atualizados.mb === ownerUid) {
    return { slots: atualizados, slotPromovido: "mb" };
  }

  return { slots: atualizados, slotPromovido: null };
}

async function esperarDocumentoUsuario(uid, tentativas = 10, intervaloMs = 250) {
  const userRef = doc(db, "usuarios", uid);
  for (let i = 0; i < tentativas; i++) {
    const userSnap = await getDoc(userRef);
    if (userSnap.exists()) return true;
    await new Promise((resolve) => setTimeout(resolve, intervaloMs));
  }
  return false;
}

async function criarContaPorConvite(email, senha, refUid) {
  if (!refUid) {
    alert("Cadastro apenas por convite.");
    return false;
  }

  let cred;
  try {
    bloqueiaRedirectAuth = true;
    cred = await createUserWithEmailAndPassword(auth, email, senha);
  } catch (e) {
    bloqueiaRedirectAuth = false;
    if (e.code === "auth/email-already-in-use") {
      alert("Este e-mail já está em uso.");
      return false;
    }
    if (e.code === "auth/weak-password") {
      alert("Senha fraca. Use pelo menos 6 caracteres.");
      return false;
    }
    alert("Erro ao criar conta: " + (e.code || e.message || e));
    return false;
  }

  const novoUid = cred.user.uid;
  const novoUserRef = doc(db, "usuarios", novoUid);
  const refUserRef = doc(db, "usuarios", refUid);

  try {
    await runTransaction(db, async (transaction) => {
      const refSnap = await transaction.get(refUserRef);
      if (!refSnap.exists()) throw new Error("convite-invalido");

      const refData = refSnap.data();
      const matrizId = refUid;

if (!idDocumentoValido(matrizId)) {
  throw new Error("ref-sem-matriz");
}

const matrizRef = doc(db, "matrizes", matrizId);
      const matrizSnap = await transaction.get(matrizRef);
      if (!matrizSnap.exists()) throw new Error("matriz-inexistente");

      const matrizData = matrizSnap.data();
      const { slots: slotsPosicionados, slot } = posicionarConvidadoNaBase(
        normalizarSlots(matrizData.slots),
        novoUid
      );
      if (!slot) {
  console.log("Sem vaga na matriz. Seguindo sem posicionar.");
}
      const convidadosAtuais = refData.convidadosCount || 0;
const novoConvidadosCount = convidadosAtuais + 1;

let slots = slotsPosicionados;
let slotPromovido = null;

if (novoConvidadosCount >= 2) {
  const resultado = promoverDonoQualificado(slotsPosicionados, refUid);
  slots = resultado.slots;
  slotPromovido = resultado.slotPromovido;
}

const statusRef = novoConvidadosCount >= 2 ? "qualified" : "open";
const matrizesAscendentes = [
  { ref: matrizRef, data: matrizData }
];

let parentUid = matrizData.parentMatrixOwnerUid;

while (parentUid) {
  const parentRef = doc(db, "matrizes", parentUid);
  const parentSnap = await transaction.get(parentRef);

  if (!parentSnap.exists()) break;

  const parentData = parentSnap.data();

  matrizesAscendentes.push({
    ref: parentRef,
    data: parentData
  });

  parentUid = parentData.parentMatrixOwnerUid;
}
      transaction.set(novoUserRef, {
        uid: novoUid,
        email,
        nome: "",
        parent: refUid,
        matrizId: novoUid,
        slotAtual: "maa",
        status: "open",
        createdAt: serverTimestamp()
      });
      
      transaction.update(refUserRef, {
  status: statusRef,
  slotAtual: slotPromovido || refData.slotAtual || "maa",
  convidadosCount: novoConvidadosCount,
  convidadosDiretos: arrayUnion(novoUid)
});
      transaction.set(doc(db, "matrizes", novoUid), {
        ownerUid: novoUid,
        parentMatrixOwnerUid: extrairUid(matrizData.ownerUid) || refUid,
        slots: { m: null, ma: null, mb: null, maa: novoUid, mab: null, mba: null, mbb: null },
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
for (const item of matrizesAscendentes) {
  let novosSlots;

  if (item.ref.path === matrizRef.path) {
  const resultadoPrincipal = promoverDonoQualificado(
    slots,
    item.data.ownerUid
  );
  novosSlots = resultadoPrincipal.slots;
} else {
  novosSlots = normalizarSlots(item.data.slots);
}

  transaction.update(item.ref, {
    slots: novosSlots,
    updatedAt: serverTimestamp()
  });
}
    });

    bloqueiaRedirectAuth = false;
    return true;
  } catch (e) {
    const erroFirestore = e?.code || e?.message || String(e);
    if (auth.currentUser && auth.currentUser.uid === novoUid) {
      try {
        await deleteUser(auth.currentUser);
      } catch (_) {
        // Se nao conseguir excluir no Auth, ao menos evita ficar logado.
      }
    }

    alert(
      e.message === "matriz-cheia"
        ? "Matriz do convite está cheia."
        : e.message === "convite-invalido"
          ? "Convite inválido."
          : e.message === "ref-sem-matriz" || e.message === "matriz-inexistente"
            ? "Convite com dados incompletos."
            : "Erro ao posicionar na matriz (" + erroFirestore + ")."
    );

    // Evita sessão autenticada sem documentos no Firestore.
    try {
      await signOut(auth);
    } catch (_) {
      // Sem impacto funcional; usuário já recebeu mensagem de erro.
    }

    bloqueiaRedirectAuth = false;
    return false;
  }
}

async function criarPrimeiroUsuario(email, senha) {
  try {
    const usuariosCount = await getCountFromServer(collection(db, "usuarios"));
    if (usuariosCount.data().count > 0) {
      alert("Cadastro apenas por convite.");
      return false;
    }
  } catch (_) {
    alert("Cadastro apenas por convite.");
    return false;
  }

  let cred;
  try {
    bloqueiaRedirectAuth = true;
    cred = await createUserWithEmailAndPassword(auth, email, senha);
  } catch (e) {
    bloqueiaRedirectAuth = false;
    if (e.code === "auth/email-already-in-use") {
      alert("Este e-mail já está em uso.");
      return false;
    }
    if (e.code === "auth/weak-password") {
      alert("Senha fraca. Use pelo menos 6 caracteres.");
      return false;
    }
    alert("Erro ao criar conta: " + (e.code || e.message || e));
    return false;
  }

  const novoUid = cred.user.uid;
  const novoUserRef = doc(db, "usuarios", novoUid);
  const novaMatrizRef = doc(db, "matrizes", novoUid);

  try {
    await runTransaction(db, async (transaction) => {
      const bootstrapSnap = await transaction.get(bootstrapRef);
      if (bootstrapSnap.exists() && bootstrapSnap.data().inicializado) {
        throw new Error("bootstrap-ja-realizado");
      }

      transaction.set(novoUserRef, {
        uid: novoUid,
        email,
        nome: "",
        parent: null,
        matrizId: novoUid,
        slotAtual: "m",
        status: "open",
        role: "owner",
        createdAt: serverTimestamp()
      });

      transaction.set(novaMatrizRef, {
        ownerUid: novoUid,
        parentMatrixOwnerUid: null,
        slots: { m: novoUid, ma: null, mb: null, maa: null, mab: null, mba: null, mbb: null },
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      transaction.set(bootstrapRef, {
        inicializado: true,
        rootUid: novoUid,
        createdAt: serverTimestamp()
      });
    });

    bloqueiaRedirectAuth = false;
    return true;
  } catch (e) {
    if (auth.currentUser && auth.currentUser.uid === novoUid) {
      try {
        await deleteUser(auth.currentUser);
      } catch (_) {
        // Evita bloquear o fluxo se a exclusao falhar por regra/permissao.
      }
    }

    alert(
      e.message === "bootstrap-ja-realizado"
        ? "Cadastro inicial já foi realizado. Use um convite."
        : "Erro ao criar usuário inicial."
    );
    bloqueiaRedirectAuth = false;
    return false;
  }
}

async function loginReal() {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (!email || !senha) {
    alert("Preencha e-mail e senha.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    const existeDocUsuario = await esperarDocumentoUsuario(auth.currentUser?.uid || "", 6, 200);
    if (!existeDocUsuario) {
      await signOut(auth);
      alert("Conta sem registro no Firestore. Tente cadastrar novamente pelo convite.");
      return;
    }
    window.fecharLogin();
    window.location.href = "dashboard.html";
  } catch (error) {
    const usuarioNaoEncontrado = error.code === "auth/user-not-found";
    const senhaInvalida = error.code === "auth/wrong-password";
    const temConvite = Boolean(ref);
    const credencialInvalida =
      error.code === "auth/invalid-credential" ||
      error.code === "auth/invalid-login-credentials";

    if (senhaInvalida) {
      alert("Senha incorreta.");
      return;
    }

    // Com convite, qualquer falha de login (exceto senha errada) tenta cadastro.
    if (!temConvite && credencialInvalida && !usuarioNaoEncontrado) {
      alert("Credenciais inválidas. Verifique e-mail e senha.");
      return;
    }

    if (!temConvite && !usuarioNaoEncontrado) {
      alert("Erro no login: " + (error.code || error.message || error));
      return;
    }

    const criado = temConvite
      ? await criarContaPorConvite(email, senha, ref)
      : await criarPrimeiroUsuario(email, senha);
    if (criado) {
      const existeDocUsuario = await esperarDocumentoUsuario(auth.currentUser?.uid || "");
      if (!existeDocUsuario) {
        await signOut(auth);
        alert("Cadastro incompleto no Firestore. Refaça o cadastro pelo convite.");
        return;
      }
      window.fecharLogin();
      window.location.href = "dashboard.html";
    }
  }
}

window.login = loginReal;

onAuthStateChanged(auth, async (user) => {
  if (bloqueiaRedirectAuth) return;
  if (!user) return;
  const existeDocUsuario = await esperarDocumentoUsuario(user.uid, 4, 150);
  if (!existeDocUsuario) {
    try {
      await signOut(auth);
    } catch (_) {}
    return;
  }
  window.location.href = "dashboard.html";
});
</script>
</body>
</html>
