<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Matriz</title>

<style>
body{
  background:#ffffff;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* TÍTULO ESTILO TERMINAL */
h1{
  color:#003366;
  font-family: Consolas, 'Courier New', monospace;
  font-size:36px;
  letter-spacing:4px;
  text-transform:uppercase;

  margin-top:30px;
  margin-bottom:80px;
}

/* CURSOR */
.cursor{
  display:inline-block;
  width:10px;
  animation: blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* MATRIZ */
svg{
  width:420px;
}

/* BOLINHAS */
circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transition: all .4s ease;
}

circle.on{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<h1 id="title"></h1>

<svg viewBox="0 0 480 460">

<circle id="b1" cx="60" cy="360" r="6"/>
<circle id="b2" cx="180" cy="360" r="6"/>
<circle id="b3" cx="300" cy="360" r="6"/>
<circle id="b4" cx="420" cy="360" r="6"/>

<circle id="m1" cx="120" cy="200" r="7"/>
<circle id="m2" cx="360" cy="200" r="7"/>

<circle id="top" cx="240" cy="60" r="8"/>

</svg>

<script>

const nodes = {
  b1:document.getElementById('b1'),
  b2:document.getElementById('b2'),
  b3:document.getElementById('b3'),
  b4:document.getElementById('b4'),
  m1:document.getElementById('m1'),
  m2:document.getElementById('m2'),
  top:document.getElementById('top')
};

const title = document.getElementById('title');
const text = "MASTERMINDs".toUpperCase();

function show(id){ nodes[id].classList.add('on'); }
function hide(id){ nodes[id].classList.remove('on'); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function typeText(){
  title.innerHTML = "";
  let i = 0;

  const interval = setInterval(()=>{
    title.innerHTML = text.substring(0,i+1) + '<span class="cursor">|</span>';
    i++;

    if(i >= text.length){
      clearInterval(interval);

      // mantém cursor piscando no final
      title.innerHTML = text + '<span class="cursor">|</span>';
    }
  }, 80);
}

function run(){

  reset();
  title.innerHTML = "";

  // 1 entra
  setTimeout(()=>{ show('b1'); },400);

  // 2 sobe
  setTimeout(()=>{
    hide('b1');
    show('m1');
  },1200);

  // 3 gera 2
  setTimeout(()=>{
    show('b1');
    show('b2');
  },2000);

  // 4 sobe topo
  setTimeout(()=>{
    hide('m1');
    hide('b1');
    hide('b2');
    show('top');
  },2800);

  // 5 meio aparece
  setTimeout(()=>{
    show('m1');
    show('m2');
  },3600);

  // 6 base completa
  setTimeout(()=>{
    show('b1');
    show('b2');
    show('b3');
    show('b4');
  },4500);

  // 7 some tudo
  setTimeout(()=>{
    reset();
  },5800);

  // 8 texto digitando
  setTimeout(()=>{
    typeText();
  },6500);

}

run();
setInterval(run,9000);

</script>

</body>
</html>
