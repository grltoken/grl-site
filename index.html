<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Cadastro</h2>

<input id="email" placeholder="Email"><br><br>
<input id="senha" placeholder="Senha" type="password"><br><br>
<input id="convite" placeholder="Código de convite"><br><br>

<button onclick="cadastrar()">Cadastrar</button>

<hr>

<h2>Login</h2>

<input id="loginEmail" placeholder="Email"><br><br>
<input id="loginSenha" placeholder="Senha" type="password"><br><br>

<button onclick="login()">Entrar</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="firebase.js"></script>

<script>

function gerar(){
  return "MM-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function cadastrar(){

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const codigo = document.getElementById("convite").value;

  if(!email || !senha || !codigo){
    alert("Preencha todos os campos");
    return;
  }

  try {

    // 🔥 VALIDAR CONVITE
    const snap = await db.collection("usuarios")
      .where("convites", "array-contains", codigo)
      .get();

    if(snap.empty){
      alert("Convite inválido ou já usado");
      return;
    }

    // 🔥 CRIAR USUÁRIO
    const userCred = await auth.createUserWithEmailAndPassword(email, senha);
    const uid = userCred.user.uid;

    const doc = snap.docs[0];
    const dono = doc.data();

    let m = {...dono.matriz};

    // 🔥 INSERIR NA MATRIZ
    if(!m.m1) m.m1 = uid;
    else if(!m.m2) m.m2 = uid;
    else if(!m.m1a) m.m1a = uid;
    else if(!m.m1b) m.m1b = uid;
    else if(!m.m2a) m.m2a = uid;
    else if(!m.m2b) m.m2b = uid;
    else {
      alert("Matriz cheia");
      return;
    }

    // 🔥 ATUALIZAR DONO
    await doc.ref.update({
      matriz: m,
      convites: dono.convites.filter(c => c !== codigo)
    });

    // 🔥 CRIAR NOVO USUÁRIO
    await db.collection("usuarios").doc(uid).set({
      email,
      matriz: {
        m1:null,m2:null,m1a:null,m1b:null,m2a:null,m2b:null
      },
      convites: [gerar(), gerar()],
      status: "incompleto"
    });

    alert("Conta criada com sucesso!");

    window.location.href = "dashboard.html";

  } catch (e){
    alert("Erro: " + e.message);
  }

}

async function login(){

  const email = document.getElementById("loginEmail").value;
  const senha = document.getElementById("loginSenha").value;

  try {
    await auth.signInWithEmailAndPassword(email, senha);
    window.location.href = "dashboard.html";
  } catch(e){
    alert("Erro: " + e.message);
  }

}

</script>

</body>
</html>
