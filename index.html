<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz</title>
<style>
body{
  background:#ffffff;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
  font-family: Consolas, monospace;
}

#loginBtn{
  position:fixed;
  top:10px;
  left:10px;
}

#loginBtn button{
  padding:6px 10px;
  background:#003366;
  color:#fff;
  border:none;
  font-family: Consolas, monospace;
  cursor:pointer;
}

h1{
  color:#003366;
  font-family: Consolas, monospace;
  font-size:28px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:40px;
}

svg{
  width:90%;
  max-width:420px;
}

circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transform-origin:center;
  transform-box:fill-box;
  transition: opacity .2s ease, transform .2s ease;
}

circle.on{
  opacity:1;
  transform:scale(1);
}

#loginModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#fff;
  border:1px solid #003366;
  width:320px;
  max-width:92vw;
  padding:16px;
}

.modal-box h2{
  margin:0 0 10px;
  color:#003366;
  font-size:16px;
}

.modal-box input{
  width:100%;
  border:1px solid #003366;
  padding:10px;
  margin-bottom:10px;
  font-family: Consolas, monospace;
}

.modal-row{
  display:flex;
  gap:8px;
}

.modal-row button{
  padding:8px 10px;
  background:#003366;
  color:#fff;
  border:none;
  font-family: Consolas, monospace;
  cursor:pointer;
}
</style>
</head>
<body>
<div id="loginBtn">
  <button id="loginButton" onclick="abrirLogin()">Login</button>
</div>

<h1 id="title"></h1>

<svg viewBox="0 0 480 460">
  <circle id="maa" cx="60" cy="360" r="6"/>
  <circle id="mab" cx="180" cy="360" r="6"/>
  <circle id="mba" cx="300" cy="360" r="6"/>
  <circle id="mbb" cx="420" cy="360" r="6"/>
  <circle id="ma" cx="120" cy="200" r="7"/>
  <circle id="mb" cx="360" cy="200" r="7"/>
  <circle id="m" cx="240" cy="60" r="8"/>
</svg>

  <div id="loginModal">
    <div class="modal-box">
      <h2>Entrar na Matriz</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="senha" type="password" placeholder="Senha">
      <div class="modal-row">
        <button onclick="login()">Entrar</button>
        <button onclick="fecharLogin()">Fechar</button>
      </div>
    </div>
  </div>

<script>
const nodes = {
  b1: document.getElementById("maa"),
  b2: document.getElementById("mab"),
  b3: document.getElementById("mba"),
  b4: document.getElementById("mbb"),
  m1: document.getElementById("ma"),
  m2: document.getElementById("mb"),
  top: document.getElementById("m")
};

const title = document.getElementById("title");
const text = "MASTERMINDs";

function show(id){ nodes[id].classList.add("on"); }
function hide(id){ nodes[id].classList.remove("on"); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function typeText(){
  title.innerHTML = "";
  let i = 0;
  const interval = setInterval(()=>{
    title.innerHTML = text.substring(0, i + 1) + "|";
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 80);
}

function run(){
  reset();
  title.innerHTML = "";
  setTimeout(()=>{show("b1");}, 400);
  setTimeout(()=>{hide("b1");}, 1100);
  setTimeout(()=>{show("m1");}, 1300);
  setTimeout(()=>{show("b1"); show("b2");}, 2000);
  setTimeout(()=>{hide("m1"); hide("b1"); hide("b2");}, 2600);
  setTimeout(()=>{show("top");}, 2800);
  setTimeout(()=>{show("m1"); show("m2");}, 3600);
  setTimeout(()=>{show("b1"); show("b2"); show("b3"); show("b4");}, 4500);
  setTimeout(()=>{reset();}, 5800);
  setTimeout(()=>{typeText();}, 6500);
}

run();
setInterval(run, 9000);
</script>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  doc,
  getDoc,
  runTransaction,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const SLOT_ORDER = ["ma", "mb", "maa", "mab", "mba", "mbb"];
const params = new URL(window.location.href).searchParams;
const ref = (params.get("ref") || "").trim();

function abrirLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function fecharLogin() {
  document.getElementById("loginModal").style.display = "none";
}

function proximoSlotDisponivel(slots) {
  for (const slot of SLOT_ORDER) {
    if (!slots[slot]) return slot;
  }
  return null;
}

async function criarContaPorConvite(email, senha, refUid) {
  if (!refUid) {
    alert("Cadastro apenas por convite.");
    return false;
  }

  let cred;
  try {
    cred = await createUserWithEmailAndPassword(auth, email, senha);
  } catch (e) {
    if (e.code === "auth/email-already-in-use") {
      alert("Este e-mail já está em uso.");
      return false;
    }
    if (e.code === "auth/weak-password") {
      alert("Senha fraca. Use pelo menos 6 caracteres.");
      return false;
    }
    alert("Erro ao criar conta: " + (e.code || e.message || e));
    return false;
  }

  const novoUid = cred.user.uid;
  const novoUserRef = doc(db, "usuarios", novoUid);
  const refUserRef = doc(db, "usuarios", refUid);

  try {
    await runTransaction(db, async (transaction) => {
      const refSnap = await transaction.get(refUserRef);
      if (!refSnap.exists()) throw new Error("convite-invalido");

      const refData = refSnap.data();
      const matrizId = refData.matrizId;
      if (!matrizId) throw new Error("ref-sem-matriz");

      const matrizRef = doc(db, "matrizes", matrizId);
      const matrizSnap = await transaction.get(matrizRef);
      if (!matrizSnap.exists()) throw new Error("matriz-inexistente");

      const matrizData = matrizSnap.data();
      const slots = { ...(matrizData.slots || {}) };
      const slot = proximoSlotDisponivel(slots);
      if (!slot) throw new Error("matriz-cheia");

      slots[slot] = novoUid;

      transaction.set(novoUserRef, {
        uid: novoUid,
        email,
        nome: "",
        parent: refUid,
        matrizId: novoUid,
        slotAtual: "maa",
        status: "open",
        createdAt: serverTimestamp()
      });

      transaction.update(matrizRef, {
        slots,
        updatedAt: serverTimestamp()
      });

      transaction.set(doc(db, "matrizes", novoUid), {
        ownerUid: novoUid,
        parentMatrixOwnerUid: matrizData.ownerUid || refUid,
        slots: { m: null, ma: null, mb: null, maa: novoUid, mab: null, mba: null, mbb: null },
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
    });

    return true;
  } catch (e) {
    alert(
      e.message === "matriz-cheia"
        ? "Matriz do convite está cheia."
        : "Erro ao posicionar na matriz."
    );
    return false;
  }
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (!email || !senha) {
    alert("Preencha e-mail e senha.");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    fecharLogin();
    window.location.href = "dashboard.html";
  } catch (error) {
    const credencialInvalida =
      error.code === "auth/user-not-found" ||
      error.code === "auth/invalid-credential" ||
      error.code === "auth/invalid-login-credentials" ||
      error.code === "auth/wrong-password";

    if (!credencialInvalida) {
      alert("Erro no login: " + (error.code || error.message || error));
      return;
    }

    const criado = await criarContaPorConvite(email, senha, ref);
    if (criado) {
      fecharLogin();
      window.location.href = "dashboard.html";
    }
  }
}

window.abrirLogin = abrirLogin;
window.fecharLogin = fecharLogin;
window.login = login;

window.addEventListener("click", function(event) {
  const modal = document.getElementById("loginModal");
  if (event.target === modal) {
    fecharLogin();
  }
});

onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  window.location.href = "dashboard.html";
});
</script>
</body>
</html>
