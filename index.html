<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz</title>

<style>
body{
  background:#ffffff;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

#loginBtn{
  position:fixed;
  top:10px;
  left:10px;
}

#loginBtn button{
  padding:6px 10px;
  background:#003366;
  color:#fff;
  border:none;
  font-family: Consolas, monospace;
  cursor:pointer;
}

h1{
  color:#003366;
  font-family: Consolas, monospace;
  font-size:28px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:40px;
}

svg{
  width:90%;
  max-width:420px;
}

circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transform-origin:center;
  transform-box:fill-box;
  transition: opacity .2s ease, transform .2s ease;
}

circle.on{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<div id="loginBtn">
  <button id="loginButton">Login</button>
</div>

<h1 id="title"></h1>

<svg viewBox="0 0 480 460">
  <circle id="b1" cx="60" cy="360" r="6"/>
  <circle id="b2" cx="180" cy="360" r="6"/>
  <circle id="b3" cx="300" cy="360" r="6"/>
  <circle id="b4" cx="420" cy="360" r="6"/>
  <circle id="m1" cx="120" cy="200" r="7"/>
  <circle id="m2" cx="360" cy="200" r="7"/>
  <circle id="top" cx="240" cy="60" r="8"/>
</svg>

<script>
const nodes = {
  b1:document.getElementById('b1'),
  b2:document.getElementById('b2'),
  b3:document.getElementById('b3'),
  b4:document.getElementById('b4'),
  m1:document.getElementById('m1'),
  m2:document.getElementById('m2'),
  top:document.getElementById('top')
};

const title = document.getElementById('title');
const text = "MASTERMINDs";

function show(id){ nodes[id].classList.add('on'); }
function hide(id){ nodes[id].classList.remove('on'); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function typeText(){
  title.innerHTML = "";
  let i = 0;

  const interval = setInterval(()=>{
    title.innerHTML = text.substring(0, i + 1) + "|";
    i++;
    if(i >= text.length) clearInterval(interval);
  },80);
}

function run(){
  reset();
  title.innerHTML = "";

  setTimeout(()=>{show('b1')},400);
  setTimeout(()=>{hide('b1')},1100);
  setTimeout(()=>{show('m1')},1300);
  setTimeout(()=>{show('b1');show('b2')},2000);
  setTimeout(()=>{hide('m1');hide('b1');hide('b2')},2600);
  setTimeout(()=>{show('top')},2800);
  setTimeout(()=>{show('m1');show('m2')},3600);
  setTimeout(()=>{show('b1');show('b2');show('b3');show('b4')},4500);
  setTimeout(()=>{reset()},5800);
  setTimeout(()=>{typeText()},6500);
}

run();
setInterval(run,9000);
</script>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  doc,
  getDoc,
  setDoc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function getParams(){
  const url = new URL(window.location.href);
  return {
    ref: url.searchParams.get("ref"),
    side: url.searchParams.get("side")
  };
}

async function criarContaPorConvite(email, senha, ref, side){
  if(side !== "left" && side !== "right"){
    alert("Convite inválido.");
    return;
  }

  const refDoc = doc(db, "usuarios", ref);
  const refSnap = await getDoc(refDoc);

  if(!refSnap.exists()){
    alert("Convite inválido.");
    return;
  }

  const refData = refSnap.data();

  if(refData[side]){
    alert("Essa vaga já foi preenchida.");
    return;
  }

  const cred = await createUserWithEmailAndPassword(auth, email, senha);
  const uid = cred.user.uid;

  await setDoc(doc(db, "usuarios", uid), {
    uid: uid,
    email: email,
    nome: "",
    parent: ref,
    left: null,
    right: null,
    status: "open",
    createdAt: serverTimestamp()
  });

  await updateDoc(refDoc, {
    [side]: uid
  });

  window.location.href = "dashboard.html";
}

async function loginOuCadastro(){
  const email = prompt("Email:")?.trim();
  const senha = prompt("Senha:")?.trim();

  if(!email || !senha){
    return;
  }

  const { ref, side } = getParams();

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = "dashboard.html";
    return;
  } catch (error) {
    const codigo = error.code || "";

    if(ref && side){
      try {
        await criarContaPorConvite(email, senha, ref, side);
        return;
      } catch (cadastroError) {
        const c = cadastroError.code || "";

        if(c === "auth/email-already-in-use"){
          alert("Esta conta já existe. Faça login com a senha correta.");
          return;
        }

        if(c === "auth/weak-password"){
          alert("Senha fraca. Use pelo menos 6 caracteres.");
          return;
        }

        if(c === "auth/invalid-email"){
          alert("Email inválido.");
          return;
        }

        if(c === "auth/network-request-failed"){
          alert("Falha de conexão.");
          return;
        }

        alert(c || "Erro ao criar conta por convite.");
        return;
      }
    }

    if(
      codigo === "auth/wrong-password" ||
      codigo === "auth/invalid-credential" ||
      codigo === "auth/invalid-login-credentials"
    ){
      alert("Email ou senha incorretos.");
      return;
    }

    if(codigo === "auth/user-not-found"){
      alert("Cadastro apenas por convite.");
      return;
    }

    if(codigo === "auth/invalid-email"){
      alert("Email inválido.");
      return;
    }

    if(codigo === "auth/network-request-failed"){
      alert("Falha de conexão.");
      return;
    }

    alert(codigo || "Erro no login.");
  }
}

document.getElementById("loginButton").addEventListener("click", loginOuCadastro);
</script>

</body>
</html>
