<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */
body{
  background:#ffffff;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family: Consolas, 'Courier New', monospace;
  overflow:hidden;
}

/* TÍTULO */
h1{
  color:#003366;
  font-size: clamp(22px, 6vw, 36px);
  letter-spacing:4px;
  text-transform:uppercase;

  margin-bottom:40px;
  text-align:center;
}

/* CURSOR */
.cursor{
  display:inline-block;
  width:10px;
  animation: blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* SVG RESPONSIVO */
svg{
  width:90%;
  max-width:420px;
  height:auto;
}

/* BOLINHAS */
circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transition: all .4s ease;
}

circle.on{
  opacity:1;
  transform:scale(1);
}

/* AJUSTE EXTRA PRA TELAS PEQUENAS */
@media (max-width:480px){

  h1{
    margin-bottom:30px;
    letter-spacing:2px;
  }

}

</style>
</head>

<body>

<h1 id="title"></h1>

<svg viewBox="0 0 480 460">

<circle id="b1" cx="60" cy="360" r="6"/>
<circle id="b2" cx="180" cy="360" r="6"/>
<circle id="b3" cx="300" cy="360" r="6"/>
<circle id="b4" cx="420" cy="360" r="6"/>

<circle id="m1" cx="120" cy="200" r="7"/>
<circle id="m2" cx="360" cy="200" r="7"/>

<circle id="top" cx="240" cy="60" r="8"/>

</svg>

<script>

const nodes = {
  b1:document.getElementById('b1'),
  b2:document.getElementById('b2'),
  b3:document.getElementById('b3'),
  b4:document.getElementById('b4'),
  m1:document.getElementById('m1'),
  m2:document.getElementById('m2'),
  top:document.getElementById('top')
};

const title = document.getElementById('title');
const text = "MASTERMINDS";

function show(id){ nodes[id].classList.add('on'); }
function hide(id){ nodes[id].classList.remove('on'); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function typeText(){
  title.innerHTML = "";
  let i = 0;

  const interval = setInterval(()=>{
    title.innerHTML = text.substring(0,i+1) + '<span class="cursor">|</span>';
    i++;

    if(i >= text.length){
      clearInterval(interval);
      title.innerHTML = text + '<span class="cursor">|</span>';
    }
  }, 80);
}

function run(){

  reset();
  title.innerHTML = "";

  setTimeout(()=>{ show('b1'); },400);

  setTimeout(()=>{
    hide('b1');
    show('m1');
  },1200);

  setTimeout(()=>{
    show('b1');
    show('b2');
  },2000);

  setTimeout(()=>{
    hide('m1');
    hide('b1');
    hide('b2');
    show('top');
  },2800);

  setTimeout(()=>{
    show('m1');
    show('m2');
  },3600);

  setTimeout(()=>{
    show('b1');
    show('b2');
    show('b3');
    show('b4');
  },4500);

  setTimeout(()=>{
    reset();
  },5800);

  setTimeout(()=>{
    typeText();
  },6500);

}

run();
setInterval(run,9000);

</script>

</body>
</html>
