<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Matriz</title>

<style>
body{
  background:#ffffff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* TÍTULO */
h1{
  color:#003366;
  font-family:Verdana, sans-serif;
  font-size:34px;
  letter-spacing:4px;
  text-transform:uppercase;

  margin-top:-50px;   /* sobe o título */
  margin-bottom:50px; /* desce a matriz */
}

/* SVG */
svg{
  width:420px;
}

/* BOLINHAS */
circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transform-origin:center;
  transition:
    opacity .5s ease,
    transform .6s cubic-bezier(.2,.8,.2,1);
}

circle.on{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<h1>Masterminds</h1>

<svg viewBox="0 0 480 460">

<!-- BASE -->
<circle id="b1" cx="60" cy="360" r="6"/>
<circle id="b2" cx="180" cy="360" r="6"/>
<circle id="b3" cx="300" cy="360" r="6"/>
<circle id="b4" cx="420" cy="360" r="6"/>

<!-- MEIO -->
<circle id="m1" cx="120" cy="200" r="7"/>
<circle id="m2" cx="360" cy="200" r="7"/>

<!-- TOPO -->
<circle id="top" cx="240" cy="60" r="8"/>

</svg>

<script>

const nodes = {
  b1:document.getElementById('b1'),
  b2:document.getElementById('b2'),
  b3:document.getElementById('b3'),
  b4:document.getElementById('b4'),
  m1:document.getElementById('m1'),
  m2:document.getElementById('m2'),
  top:document.getElementById('top')
};

function show(id){ nodes[id].classList.add('on'); }
function hide(id){ nodes[id].classList.remove('on'); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function run(){

  reset();

  // 1 entra
  setTimeout(()=>{ show('b1'); },400);

  // 2 sobe
  setTimeout(()=>{
    hide('b1');
    show('m1');
  },1200);

  // 3 gera 2
  setTimeout(()=>{
    show('b1');
    show('b2');
  },2000);

  // 4 sobe topo
  setTimeout(()=>{
    hide('m1');
    hide('b1');
    hide('b2');
    show('top');
  },2800);

  // 5 meio aparece
  setTimeout(()=>{
    show('m1');
    show('m2');
  },3600);

  // 6 base completa
  setTimeout(()=>{
    show('b1');
    show('b2');
    show('b3');
    show('b4');
  },4500);

  // 7 final
  setTimeout(()=>{
    hide('top');
  },5800);

}

run();
setInterval(run,8200);

</script>

</body>
</html>
