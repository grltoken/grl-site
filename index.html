<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRL Network</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Consolas, monospace;
    }
    #loginBtn { position: fixed; top: 12px; left: 12px; }
    #loginBtn button {
      padding: 7px 14px; background: #003366; color: #fff;
      border: none; border-radius: 10px; font-family: Consolas, monospace;
      font-size: 13px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,51,102,0.18);
      transition: opacity .2s, transform .06s;
    }
    #loginBtn button:hover  { opacity: .88; }
    #loginBtn button:active { transform: translateY(1px); }
    h1 {
      color: #003366; font-size: 26px; letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 44px; min-height: 36px;
    }
    svg { width: 90%; max-width: 420px; }
    circle {
      fill: #003366; opacity: 0;
      transform: scale(0.5); transform-origin: center; transform-box: fill-box;
      transition: opacity .25s ease, transform .25s ease;
    }
    circle.on { opacity: 1; transform: scale(1); }
    line {
      stroke: #003366; stroke-width: 1.5; opacity: 0;
      transition: opacity .6s ease;
    }
    line.on { opacity: 0.30; }
    #loginModal {
      display: none; position: fixed; inset: 0;
      background: rgba(8,18,40,0.30); backdrop-filter: blur(2px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      width: 100%; max-width: 340px; background: #fff;
      border: 1px solid rgba(0,51,102,0.15); border-radius: 16px;
      padding: 22px 18px; box-shadow: 0 14px 40px rgba(0,35,70,0.13);
    }
    .modal-box h2 { margin-bottom: 14px; color: #002f5e; font-size: 14px; font-weight: 600; }
    .modal-box input {
      width: 100%; border: 1px solid rgba(0,51,102,0.22); border-radius: 10px;
      padding: 10px 12px; margin-bottom: 10px; font-family: Consolas, monospace;
      font-size: 13px; color: #003366; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .modal-box input:focus { border-color: #2a6fb3; box-shadow: 0 0 0 3px rgba(42,111,179,.10); }
    .modal-error { font-size: 12px; color: #c0392b; min-height: 16px; margin-bottom: 8px; text-align: center; }
    .modal-row { display: flex; gap: 8px; }
    .modal-row button {
      flex: 1; padding: 9px; border-radius: 10px;
      border: 1px solid #003366; background: #003366; color: #fff;
      font-family: Consolas, monospace; font-size: 12px;
      cursor: pointer; transition: opacity .2s, transform .06s;
    }
    .modal-row button:last-child { background: #fff; color: #003366; }
    .modal-row button:hover  { opacity: .88; }
    .modal-row button:active { transform: translateY(1px); }
  </style>
</head>
<body>

  <div id="loginBtn"><button onclick="abrirLogin()">Login</button></div>
  <h1 id="title"></h1>

  <svg viewBox="0 0 480 400">
    <line id="l-m-ma"   x1="240" y1="60"  x2="120" y2="210"/>
    <line id="l-m-mb"   x1="240" y1="60"  x2="360" y2="210"/>
    <line id="l-ma-maa" x1="120" y1="210" x2="60"  y2="360"/>
    <line id="l-ma-mab" x1="120" y1="210" x2="180" y2="360"/>
    <line id="l-mb-mba" x1="360" y1="210" x2="300" y2="360"/>
    <line id="l-mb-mbb" x1="360" y1="210" x2="420" y2="360"/>
    <circle id="maa" cx="60"  cy="360" r="6"/>
    <circle id="mab" cx="180" cy="360" r="6"/>
    <circle id="mba" cx="300" cy="360" r="6"/>
    <circle id="mbb" cx="420" cy="360" r="6"/>
    <circle id="ma"  cx="120" cy="210" r="7"/>
    <circle id="mb"  cx="360" cy="210" r="7"/>
    <circle id="m"   cx="240" cy="60"  r="9"/>
  </svg>

  <div id="loginModal">
    <div class="modal-box">
      <h2>Entrar na Matriz</h2>
      <input id="email" type="email"    placeholder="E-mail">
      <input id="senha" type="password" placeholder="Senha">
      <div class="modal-error" id="modalError"></div>
      <div class="modal-row">
        <button onclick="login()">Entrar</button>
        <button onclick="fecharLogin()">Fechar</button>
      </div>
      <div style="text-align:center; margin-top:10px;">
        <a href="#" onclick="recuperarSenha()" style="font-size:11px; color:#003366; opacity:.6; text-decoration:none; font-family:Consolas,monospace;">Esqueci minha senha</a>
      </div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById("title");
    const TEXTO   = "MASTERMINDs";

    function on(...ids)  { ids.forEach(id => document.getElementById(id)?.classList.add("on")); }
    function off(...ids) { ids.forEach(id => document.getElementById(id)?.classList.remove("on")); }

    function reset() {
      off("m","ma","mb","maa","mab","mba","mbb");
      off("l-m-ma","l-m-mb","l-ma-maa","l-ma-mab","l-mb-mba","l-mb-mbb");
      titleEl.innerHTML = "";
    }

    function digitar() {
      titleEl.innerHTML = "";
      let i = 0;
      const iv = setInterval(() => {
        titleEl.innerHTML = TEXTO.substring(0, i + 1) + "|";
        i++;
        if (i >= TEXTO.length) {
          clearInterval(iv);
          setTimeout(() => { titleEl.innerHTML = TEXTO; }, 400);
        }
      }, 80);
    }

    function animar() {
      reset();
      setTimeout(() => { on("maa"); }, 500);
      setTimeout(() => { on("mab"); }, 1200);
      setTimeout(() => { on("mba"); }, 2000);
      setTimeout(() => { off("mba"); }, 2800);
      setTimeout(() => { on("ma"); }, 3100);
      setTimeout(() => { on("mba"); }, 3900);
      setTimeout(() => { on("mbb"); }, 4700);
      setTimeout(() => { on("mb"); }, 5500);
      setTimeout(() => { on("m"); }, 6300);
      setTimeout(() => { on("l-m-ma","l-m-mb","l-ma-maa","l-ma-mab","l-mb-mba","l-mb-mbb"); }, 7000);
      setTimeout(() => { digitar(); }, 7500);
    }

    animar();
    setInterval(animar, 12000);
  </script>

  <script>
    function abrirLogin() {
      document.getElementById("loginModal").style.display = "flex";
      document.getElementById("modalError").textContent = "";
    }
    function fecharLogin() {
      document.getElementById("loginModal").style.display = "none";
    }
    window.addEventListener("click", e => {
      if (e.target === document.getElementById("loginModal")) fecharLogin();
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.getElementById("loginModal").style.display === "flex") {
        window.login && window.login();
      }
    });
    window.abrirLogin  = abrirLogin;
    window.fecharLogin = fecharLogin;
  </script>

  <script type="module">
    import { auth } from "./firebase.js";
    import {
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    window.login = async function() {
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;
      const erro  = document.getElementById("modalError");
      erro.textContent = "";
      if (!email || !senha) { erro.textContent = "Preencha e-mail e senha."; return; }
      try {
        await signInWithEmailAndPassword(auth, email, senha);
        fecharLogin();
        window.location.href = "dashboard.html";
      } catch(e) {
        erro.textContent = "E-mail ou senha incorretos.";
      }
    };

    window.recuperarSenha = async function() {
      const email = document.getElementById("email").value.trim();
      const erro  = document.getElementById("modalError");
      if (!email) { erro.textContent = "Digite seu e-mail para recuperar a senha."; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        erro.style.color = "#003366";
        erro.textContent = "E-mail de recuperação enviado.";
      } catch(e) {
        erro.style.color = "#c0392b";
        erro.textContent = "E-mail não encontrado.";
      }
    };

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "dashboard.html";
    });
  </script>

</body>
</html>
