<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz</title>

<style>
body{
  background:#ffffff;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

#loginBtn{
  position:fixed;
  top:10px;
  left:10px;
}

#loginBtn button{
  padding:6px 10px;
  background:#003366;
  color:#fff;
  border:none;
  font-family: Consolas, monospace;
  cursor:pointer;
}

h1{
  color:#003366;
  font-family: Consolas, monospace;
  font-size:28px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:40px;
}

svg{
  width:90%;
  max-width:420px;
}

circle{
  fill:#003366;
  opacity:0;
  transform:scale(0.6);
  transition: all .4s ease;
}

circle.on{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<div id="loginBtn">
  <button onclick="login()">Login</button>
</div>

<h1 id="title"></h1>

<svg viewBox="0 0 480 460">
<circle id="b1" cx="60" cy="360" r="6"/>
<circle id="b2" cx="180" cy="360" r="6"/>
<circle id="b3" cx="300" cy="360" r="6"/>
<circle id="b4" cx="420" cy="360" r="6"/>
<circle id="m1" cx="120" cy="200" r="7"/>
<circle id="m2" cx="360" cy="200" r="7"/>
<circle id="top" cx="240" cy="60" r="8"/>
</svg>

<script>
// animação
const nodes = {
  b1:document.getElementById('b1'),
  b2:document.getElementById('b2'),
  b3:document.getElementById('b3'),
  b4:document.getElementById('b4'),
  m1:document.getElementById('m1'),
  m2:document.getElementById('m2'),
  top:document.getElementById('top')
};

const title = document.getElementById('title');
const text = "MASTERMINDs";

function show(id){ nodes[id].classList.add('on'); }
function hide(id){ nodes[id].classList.remove('on'); }

function reset(){
  Object.keys(nodes).forEach(hide);
}

function typeText(){
  title.innerHTML="";
  let i=0;

  const interval=setInterval(()=>{
    title.innerHTML=text.substring(0,i+1)+"|";
    i++;
    if(i>=text.length) clearInterval(interval);
  },80);
}

function run(){
  reset();
  title.innerHTML="";

  setTimeout(()=>{show('b1')},400);
  setTimeout(()=>{hide('b1');show('m1')},1200);
  setTimeout(()=>{show('b1');show('b2')},2000);
  setTimeout(()=>{hide('m1');hide('b1');hide('b2');show('top')},2800);
  setTimeout(()=>{show('m1');show('m2')},3600);
  setTimeout(()=>{show('b1');show('b2');show('b3');show('b4')},4500);
  setTimeout(()=>{reset()},5800);
  setTimeout(()=>{typeText()},6500);
}

run();
setInterval(run,9000);
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJDpMURpH3Za0VWvpRL4jLWjDhfBF4C5M",
  authDomain: "grlnetwork.firebaseapp.com",
  projectId: "grlnetwork",
  storageBucket: "grlnetwork.firebasestorage.app",
  messagingSenderId: "887517900417",
  appId: "1:887517900417:web:d6bfd784e762bbd6312780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 FUNÇÃO CORRIGIDA
window.login = async function(){

  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");

  const email = prompt("Email:");
  const senha = prompt("Senha:");

  try {
    // ✅ LOGIN normal
    await signInWithEmailAndPassword(auth, email, senha);

  } catch {

    // 🔒 cadastro só com convite
    if (!ref) {
      alert("Cadastro permitido apenas por convite.");
      return;
    }

    const parentRef = doc(db, "usuarios", ref);
    const parentSnap = await getDoc(parentRef);

    if (!parentSnap.exists()) {
      alert("Convite inválido.");
      return;
    }

    const parentData = parentSnap.data();

    if (parentData.left && parentData.right) {
      alert("Convite esgotado.");
      return;
    }

    // cria usuário
    const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
    const user = userCredential.user;

    await setDoc(doc(db, "usuarios", user.uid), {
      left: null,
      right: null,
      status: "open",
      createdAt: Date.now(),
      parent: ref
    });

    // encaixe
    if (!parentData.left) {
      await updateDoc(parentRef, { left: user.uid });

    } else {
      await updateDoc(parentRef, {
        right: user.uid,
        status: "closed"
      });
    }

  }

  window.location.href = "dashboard.html";
};

</script>

</body>
</html>
