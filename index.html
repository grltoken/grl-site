<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  flex-direction:column;
}

h1{
  color:#003366;
}

input, button{
  padding:12px;
  margin:5px;
}

button{
  background:#003366;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>MATRIZ</h1>

<input id="email" placeholder="Digite seu email">
<button onclick="entrar()">Entrar</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCJDpMURpH3Za0VWvpRL4jLWjDhfBF4C5M",
  authDomain: "grlnetwork.firebaseapp.com",
  projectId: "grlnetwork",
  storageBucket: "grlnetwork.firebasestorage.app",
  messagingSenderId: "887517900417",
  appId: "1:887517900417:web:d6bfd784e762bbd6312780"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function entrar(){
  const email = document.getElementById("email").value;

  if(!email){
    alert("Digite um email");
    return;
  }

  db.collection("usuarios").doc(email).set({
    email: email,
    role: "user",
    ativo: true,
    pago: false,
    indicados: [],
    convites: [],
    positions: {
      m1: null,
      m2: null,
      a1: null,
      a2: null,
      b1: null,
      b2: null
    }
  }).then(() => {
    window.location.href = "dashboard.html";
  }).catch((error) => {
    console.log(error);
    alert("Erro ao salvar");
  });
}
</script>

</body>
</html>
