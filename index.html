<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz Mastermind</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:#ffffff;
  text-align:center;
  padding:20px;
}

/* TOPBAR */
#topbar{
  position:fixed;
  top:10px;
  right:10px;
}

#topbar button{
  padding:8px 12px;
  background:#003366;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* AUTH */
#auth{
  display:none;
  margin-top:80px;
}

input{
  padding:10px;
  margin:5px;
  width:220px;
}

/* CONVITES */
.conviteBox{
  border:1px solid #003366;
  padding:10px;
  margin:10px auto;
  max-width:260px;
  display:flex;
  justify-content:space-between;
}

/* APP */
#app{
  margin-top:80px;
}

/* BOTÕES */
button{
  padding:10px;
  background:#003366;
  color:white;
  border:none;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TOPO -->
<div id="topbar">
  <button onclick="mostrarLogin()">Entrar</button>
</div>

<h2>Matriz Mastermind</h2>

<!-- LOGIN -->
<div id="auth">

  <h3>Criar acesso</h3>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="cadastrar()">Cadastrar</button>

  <hr style="margin:20px;">

  <h3>Entrar</h3>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginSenha" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>

  <p id="msg"></p>

</div>

<!-- SISTEMA -->
<div id="app"></div>

<script>

// GERAR CONVITE
function gerarConvite(){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code="MM-";
  for(let i=0;i<6;i++){
    code+=chars[Math.floor(Math.random()*chars.length)];
  }
  return code;
}

// MOSTRAR LOGIN
function mostrarLogin(){
  document.getElementById("auth").style.display="block";
}

// CADASTRAR
function cadastrar(){

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(!email || !senha){
    alert("Preencha tudo");
    return;
  }

  const user = {
    email,
    senha,
    posicao:"Base",
    convites:[gerarConvite(), gerarConvite()]
  };

  localStorage.setItem("user_"+email, JSON.stringify(user));

  document.getElementById("msg").innerText = "Cadastro criado!";
}

// LOGIN
function login(){

  const email = document.getElementById("loginEmail").value;
  const senha = document.getElementById("loginSenha").value;

  const user = JSON.parse(localStorage.getItem("user_"+email));

  if(user && user.senha === senha){

    localStorage.setItem("logado", email);
    abrirSistema();
    atualizarTopbar();

  } else {
    document.getElementById("msg").innerText = "Login inválido";
  }

}

// ABRIR SISTEMA
function abrirSistema(){

  const email = localStorage.getItem("logado");
  const user = JSON.parse(localStorage.getItem("user_"+email));

  document.getElementById("auth").style.display="none";

  document.getElementById("app").innerHTML = `
    <h3>Bem-vindo</h3>
    <p>Nível: <b id="posicao">${user.posicao}</b></p>

    <h3>Seus convites</h3>

    <div class="conviteBox">
      <span id="c1">${user.convites[0]}</span>
      <button onclick="copiar('c1')">Copiar</button>
    </div>

    <div class="conviteBox">
      <span id="c2">${user.convites[1]}</span>
      <button onclick="copiar('c2')">Copiar</button>
    </div>

    <p id="msg2"></p>

    <button onclick="subir()">Simular subida</button>
    <button onclick="logout()">Sair</button>
  `;

}

// COPIAR
function copiar(id){
  const texto = document.getElementById(id).innerText;
  navigator.clipboard.writeText(texto);
  document.getElementById("msg2").innerText="Convite copiado!";
}

// SIMULAR SUBIDA
function subir(){

  const email = localStorage.getItem("logado");
  let user = JSON.parse(localStorage.getItem("user_"+email));

  if(user.posicao === "Base"){
    user.posicao = "Nível 2";
  } else {
    user.posicao = "👑 MindMaster";
  }

  localStorage.setItem("user_"+email, JSON.stringify(user));
  abrirSistema();
}

// LOGOUT
function logout(){
  localStorage.removeItem("logado");
  location.reload();
}

// ATUALIZAR TOPO
function atualizarTopbar(){
  const logado = localStorage.getItem("logado");

  if(logado){
    document.getElementById("topbar").innerHTML = `
      <button onclick="logout()">Sair</button>
    `;
  }
}

// AUTO LOGIN
window.onload = ()=>{
  if(localStorage.getItem("logado")){
    abrirSistema();
  }
  atualizarTopbar();
}

</script>

</body>
</html>
